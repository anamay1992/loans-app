quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_URL}

quarkus.hibernate-orm.database.generation=update

quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.log.format-sql=false

quarkus.oidc.auth-server-url=${AUTH_URL}
quarkus.oidc.client-id=authenticated
mp.jwt.verify.issuer=${AUTH_URL}
mp.jwt.verify.audiences=authenticated
quarkus.http.auth.permission.secured.paths=/*
quarkus.http.auth.permission.secured.policy=authenticated